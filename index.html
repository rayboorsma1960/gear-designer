{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Scene setup ──
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(80, 50, 80);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
renderer.setClearColor(0x1a1a2e);
document.body.appendChild(renderer.domElement);

const orbitControls = new OrbitControls(camera, renderer.domElement);
orbitControls.enableDamping = true;
orbitControls.dampingFactor = 0.05;

// Lighting
scene.add(new THREE.AmbientLight(0x404060, 1.5));
const dirLight = new THREE.DirectionalLight(0xffffff, 2);
dirLight.position.set(50, 80, 50);
scene.add(dirLight);
const dirLight2 = new THREE.DirectionalLight(0x4fc3f7, 0.8);
dirLight2.position.set(-30, -20, -40);
scene.add(dirLight2);

// Grid
scene.add(new THREE.GridHelper(150, 30, 0x333355, 0x222244));

// ── State ──
let gear1Mesh = null, gear2Mesh = null;
let gear1Group = new THREE.Group();
let gear2Group = new THREE.Group();
scene.add(gear1Group);
scene.add(gear2Group);

let animating = false;
let showDims = false;
let showGear2 = false;
let annotationLines = [];

// Gear params cache
let g1Params = {}, g2Params = {};

// ── Gear math ──
function involute(baseR, angle) {
  return {
    x: baseR * (Math.cos(angle) + angle * Math.sin(angle)),
    y: baseR * (Math.sin(angle) - angle * Math.cos(angle))
  };
}

function buildGearProfile(numTeeth, mod, pressureAngleDeg) {
  const pitchR = (numTeeth * mod) / 2;
  const addendum = mod;
  const dedendum = 1.25 * mod;
  const outerR = pitchR + addendum;
  const rootR = pitchR - dedendum;
  const baseR = pitchR * Math.cos(pressureAngleDeg * Math.PI / 180);
  const toothAngle = (2 * Math.PI) / numTeeth;

  const pts = [];
  const invSteps = 10;

  function invAngleForR(r) { return Math.sqrt((r / baseR) ** 2 - 1); }
  function involuteAngleAtR(r) {
    const a = Math.sqrt((r / baseR) ** 2 - 1);
    return a - Math.atan(a);
  }

  const maxInvAngle = invAngleForR(outerR);
  const pitchInvAngle = involuteAngleAtR(pitchR);
  const halfToothAtPitch = toothAngle / 4;

  for (let t = 0; t < numTeeth; t++) {
    const baseAngle = t * toothAngle;

    for (let i = 0; i <= invSteps; i++) {
      const a = (i / invSteps) * maxInvAngle;
      const p = involute(baseR, a);
      const r = Math.sqrt(p.x * p.x + p.y * p.y);
      if (r < rootR) continue;
      let ang = Math.atan2(p.y, p.x);
      ang = baseAngle + halfToothAtPitch - pitchInvAngle + ang;
      const cr = Math.min(r, outerR);
      pts.push({ x: cr * Math.cos(ang), y: cr * Math.sin(ang) });
    }

    const tipStart = baseAngle + halfToothAtPitch - pitchInvAngle + Math.atan2(
      involute(baseR, maxInvAngle).y, involute(baseR, maxInvAngle).x
    );
    const tipMirror = baseAngle + toothAngle / 2;
    const tipEnd = 2 * tipMirror - tipStart;
    for (let i = 0; i <= 3; i++) {
      const a = tipStart + (tipEnd - tipStart) * (i / 3);
      pts.push({ x: outerR * Math.cos(a), y: outerR * Math.sin(a) });
    }

    for (let i = invSteps; i >= 0; i--) {
      const a = (i / invSteps) * maxInvAngle;
      const p = involute(baseR, a);
      const r = Math.sqrt(p.x * p.x + p.y * p.y);
      if (r < rootR) continue;
      let ang = Math.atan2(p.y, p.x);
      ang = baseAngle + toothAngle - halfToothAtPitch + pitchInvAngle - ang;
      const cr = Math.min(r, outerR);
      pts.push({ x: cr * Math.cos(ang), y: cr * Math.sin(ang) });
    }

    const rootStart = baseAngle + toothAngle - halfToothAtPitch + pitchInvAngle;
    const rootEnd = (baseAngle + toothAngle) + halfToothAtPitch - pitchInvAngle;
    for (let i = 0; i <= 3; i++) {
      const a = rootStart + (rootEnd - rootStart) * (i / 3);
      pts.push({ x: rootR * Math.cos(a), y: rootR * Math.sin(a) });
    }
  }

  return { pts, rootR, outerR, pitchR, baseR };
}

function buildHelicalGear(numTeeth, mod, helixDeg, faceW, pressureDeg) {
  const profile = buildGearProfile(numTeeth, mod, pressureDeg);
  const pts = profile.pts;
  const n = pts.length;
  const slices = 32;
  const helixRad = helixDeg * Math.PI / 180;
  const pitchR = profile.pitchR;
  const twistPerUnit = Math.tan(helixRad) / pitchR;
  const totalTwist = twistPerUnit * faceW;
  const halfW = faceW / 2;

  const positions = [], normals = [], indices = [];

  for (let s = 0; s <= slices; s++) {
    const t = s / slices;
    const z = -halfW + t * faceW;
    const twist = -totalTwist / 2 + t * totalTwist;
    for (let i = 0; i < n; i++) {
      const cos = Math.cos(twist), sin = Math.sin(twist);
      const x = pts[i].x * cos - pts[i].y * sin;
      const y = pts[i].x * sin + pts[i].y * cos;
      positions.push(x, z, y);
      const r = Math.sqrt(x * x + y * y);
      normals.push(x / r, 0, y / r);
    }
  }

  for (let s = 0; s < slices; s++) {
    for (let i = 0; i < n; i++) {
      const next = (i + 1) % n;
      const a = s * n + i, b = s * n + next;
      const c = (s + 1) * n + next, d = (s + 1) * n + i;
      indices.push(a, b, c, a, c, d);
    }
  }

  // ── Bore + annular caps (watertight manifold) ──
  const boreR = profile.rootR * 0.3;
  const boreBase = positions.length / 3;
  for (let s = 0; s <= slices; s++) {
    for (let i = 0; i < n; i++) {
      const profileIdx = s * n + i;
      const px = positions[profileIdx * 3];
      const py = positions[profileIdx * 3 + 1];
      const pz = positions[profileIdx * 3 + 2];
      const angle = Math.atan2(pz, px);
      positions.push(boreR * Math.cos(angle), py, boreR * Math.sin(angle));
      normals.push(-Math.cos(angle), 0, -Math.sin(angle));
    }
  }
  for (let s = 0; s < slices; s++) {
    for (let i = 0; i < n; i++) {
      const next = (i + 1) % n;
      const a = boreBase + s * n + i, b = boreBase + s * n + next;
      const c = boreBase + (s + 1) * n + next, d = boreBase + (s + 1) * n + i;
      indices.push(a, c, b, a, d, c);
    }
  }

  // Bottom annular cap (profile ring → bore ring at slice 0)
  for (let i = 0; i < n; i++) {
    const next = (i + 1) % n;
    indices.push(i, boreBase + next, boreBase + i);
    indices.push(i, next, boreBase + next);
  }

  // Top annular cap (profile ring → bore ring at last slice)
  for (let i = 0; i < n; i++) {
    const next = (i + 1) % n;
    const pA = slices * n + i, pB = slices * n + next;
    const bA = boreBase + slices * n + i, bB = boreBase + slices * n + next;
    indices.push(pA, bA, bB);
    indices.push(pA, bB, pB);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
  geo.setIndex(indices);
  geo.computeVertexNormals();

  return { geo, profile };
}

// ── Herringbone (double helical) gear geometry ──
function buildHerringboneGear(numTeeth, mod, helixDeg, faceW, pressureDeg) {
  const profile = buildGearProfile(numTeeth, mod, pressureDeg);
  const pts = profile.pts;
  const n = pts.length;
  const halfSlices = 24; // slices per half
  const totalSlices = halfSlices * 2;
  const helixRad = helixDeg * Math.PI / 180;
  const pitchR = profile.pitchR;
  const twistPerUnit = Math.tan(helixRad) / pitchR;
  const halfW = faceW / 2;
  const halfTwist = twistPerUnit * halfW; // total twist for one half

  const positions = [], normals = [], indices = [];

  // First half: z = -halfW to 0, twist from -halfTwist to 0
  for (let s = 0; s <= halfSlices; s++) {
    const t = s / halfSlices;
    const z = -halfW + t * halfW;
    const twist = -halfTwist + t * halfTwist;
    for (let i = 0; i < n; i++) {
      const cos = Math.cos(twist), sin = Math.sin(twist);
      const x = pts[i].x * cos - pts[i].y * sin;
      const y = pts[i].x * sin + pts[i].y * cos;
      positions.push(x, z, y);
      const r = Math.sqrt(x * x + y * y);
      normals.push(x / r, 0, y / r);
    }
  }

  // Second half: z = 0 to +halfW, twist from 0 back to -halfTwist (mirror)
  for (let s = 1; s <= halfSlices; s++) {
    const t = s / halfSlices;
    const z = t * halfW;
    const twist = -t * halfTwist; // mirror: goes from 0 back to -halfTwist
    for (let i = 0; i < n; i++) {
      const cos = Math.cos(twist), sin = Math.sin(twist);
      const x = pts[i].x * cos - pts[i].y * sin;
      const y = pts[i].x * sin + pts[i].y * cos;
      positions.push(x, z, y);
      const r = Math.sqrt(x * x + y * y);
      normals.push(x / r, 0, y / r);
    }
  }

  // Index the side faces
  for (let s = 0; s < totalSlices; s++) {
    for (let i = 0; i < n; i++) {
      const next = (i + 1) % n;
      const a = s * n + i, b = s * n + next;
      const c = (s + 1) * n + next, d = (s + 1) * n + i;
      indices.push(a, b, c, a, c, d);
    }
  }

  // ── Bore + annular caps (watertight manifold) ──
  const boreR = profile.rootR * 0.3;
  const boreBase = positions.length / 3;
  for (let s = 0; s <= totalSlices; s++) {
    for (let i = 0; i < n; i++) {
      const profileIdx = s * n + i;
      const px = positions[profileIdx * 3];
      const py = positions[profileIdx * 3 + 1];
      const pz = positions[profileIdx * 3 + 2];
      const angle = Math.atan2(pz, px);
      positions.push(boreR * Math.cos(angle), py, boreR * Math.sin(angle));
      normals.push(-Math.cos(angle), 0, -Math.sin(angle));
    }
  }
  for (let s = 0; s < totalSlices; s++) {
    for (let i = 0; i < n; i++) {
      const next = (i + 1) % n;
      const a = boreBase + s * n + i, b = boreBase + s * n + next;
      const c = boreBase + (s + 1) * n + next, d = boreBase + (s + 1) * n + i;
      indices.push(a, c, b, a, d, c);
    }
  }

  // Bottom annular cap (profile ring → bore ring at slice 0)
  for (let i = 0; i < n; i++) {
    const next = (i + 1) % n;
    indices.push(i, boreBase + next, boreBase + i);
    indices.push(i, next, boreBase + next);
  }

  // Top annular cap (profile ring → bore ring at last slice)
  for (let i = 0; i < n; i++) {
    const next = (i + 1) % n;
    const pA = totalSlices * n + i, pB = totalSlices * n + next;
    const bA = boreBase + totalSlices * n + i, bB = boreBase + totalSlices * n + next;
    indices.push(pA, bA, bB);
    indices.push(pA, bB, pB);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
  geo.setIndex(indices);
  geo.computeVertexNormals();

  return { geo, profile };
}

// ── Bevel gear geometry ──
function buildBevelGear(numTeeth, mod, faceW, pressureDeg, matingTeeth) {
  // Pitch cone geometry for 90° shaft angle
  const pitchConeAngle = Math.atan2(numTeeth, matingTeeth); // radians
  const profile = buildGearProfile(numTeeth, mod, pressureDeg);
  const pts = profile.pts;
  const n = pts.length;
  const pitchR = profile.pitchR;
  const coneDistance = pitchR / Math.sin(pitchConeAngle);

  // Inner scale factor (how much smaller teeth are at inner end)
  const innerScale = Math.max(0.3, (coneDistance - faceW) / coneDistance);

  const slices = 24;
  const positions = [], normals = [], indices = [];

  // The cone rises along Y-axis. At s=0 (outer/bottom), full scale.
  // At s=slices (inner/top), reduced scale. Y increases upward along cone.
  const coneRise = faceW * Math.cos(pitchConeAngle); // height gained

  for (let s = 0; s <= slices; s++) {
    const t = s / slices;
    const scale = 1 - t * (1 - innerScale); // linear taper from 1 to innerScale
    const y = t * coneRise; // height along cone

    for (let i = 0; i < n; i++) {
      const x = pts[i].x * scale;
      const z = pts[i].y * scale;
      positions.push(x, y, z);

      // Normal: blend outward radial + cone slope
      const r = Math.sqrt(x * x + z * z) || 1;
      const nx = x / r * Math.cos(pitchConeAngle);
      const ny = Math.sin(pitchConeAngle);
      const nz = z / r * Math.cos(pitchConeAngle);
      normals.push(nx, ny, nz);
    }
  }

  // Side faces
  for (let s = 0; s < slices; s++) {
    for (let i = 0; i < n; i++) {
      const next = (i + 1) % n;
      const a = s * n + i, b = s * n + next;
      const c = (s + 1) * n + next, d = (s + 1) * n + i;
      indices.push(a, b, c, a, c, d);
    }
  }

  // ── Watertight bore + annular caps (no hub extension) ──
  const angles = new Array(n);
  for (let i = 0; i < n; i++) {
    angles[i] = Math.atan2(pts[i].y, pts[i].x);
  }

  const boreR = profile.rootR * 0.3;

  // Bore cylinder: y=0 to y=coneRise (through the cone only)
  const boreBase = positions.length / 3;
  for (let s = 0; s <= slices; s++) {
    const y = (s / slices) * coneRise;
    for (let i = 0; i < n; i++) {
      positions.push(boreR * Math.cos(angles[i]), y, boreR * Math.sin(angles[i]));
      normals.push(-Math.cos(angles[i]), 0, -Math.sin(angles[i]));
    }
  }
  for (let s = 0; s < slices; s++) {
    for (let i = 0; i < n; i++) {
      const next = (i + 1) % n;
      const a = boreBase + s * n + i, b = boreBase + s * n + next;
      const c = boreBase + (s + 1) * n + next, d = boreBase + (s + 1) * n + i;
      indices.push(a, c, b, a, d, c);
    }
  }

  // Bottom annular cap at y=0 (profile → bore, -Y normal)
  for (let i = 0; i < n; i++) {
    const next = (i + 1) % n;
    indices.push(i, boreBase + next, boreBase + i);
    indices.push(i, next, boreBase + next);
  }

  // Top annular cap at y=coneRise (inner cone profile → bore, +Y normal)
  for (let i = 0; i < n; i++) {
    const next = (i + 1) % n;
    const pA = slices * n + i, pB = slices * n + next;
    const bA = boreBase + slices * n + i, bB = boreBase + slices * n + next;
    indices.push(pA, bB, bA);
    indices.push(pA, pB, bB);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
  geo.setIndex(indices);
  geo.computeVertexNormals();

  return { geo, profile, pitchConeAngle, coneDistance, innerScale, coneRise };
}

// ── Worm gear geometry ──
function buildWormGeo(mod, starts, wormOuterDia, wormLength, pressureDeg) {
  const pitch = mod * Math.PI;
  const lead = starts * pitch;
  const outerR = wormOuterDia / 2;
  const addendum = mod;
  const dedendum = 1.25 * mod;
  const pitchR = outerR - addendum;
  const rootR = pitchR - dedendum;
  const leadAngle = Math.atan2(lead, Math.PI * pitchR * 2);

  const positions = [], normals = [], indices = [];
  // Scale segments with worm dimensions for consistent smoothness
  const axialSegs = Math.max(64, Math.round(wormLength * 3));
  // More radial segments per start to keep threads smooth
  const radialSegs = Math.max(36, starts * 16);
  const halfLen = wormLength / 2;

  // Build worm as helical ridges on a cylinder
  // For each axial slice, create a radial cross-section with thread profile
  const toothDepth = addendum + dedendum;
  const toothHalfAngle = pitch / 2;

  for (let s = 0; s <= axialSegs; s++) {
    const t = s / axialSegs;
    const z = -halfLen + t * wormLength;

    for (let r = 0; r < radialSegs; r++) {
      const theta = (r / radialSegs) * Math.PI * 2;

      // Calculate thread height at this angular and axial position
      // The thread is a helical ridge: phase = theta * starts - (z / pitch) * 2π
      const phase = theta * starts - (z / pitch) * Math.PI * 2;
      // Normalize to [-π, π]
      let p = ((phase % (Math.PI * 2)) + Math.PI * 3) % (Math.PI * 2) - Math.PI;

      // Trapezoidal tooth profile
      let radius;
      const pressRad = pressureDeg * Math.PI / 180;
      const toothWidth = Math.PI * 0.4; // tooth width at pitch
      const absP = Math.abs(p);

      if (absP < toothWidth * 0.5) {
        // Top of tooth
        radius = outerR;
      } else if (absP < toothWidth * 0.5 + pressRad * 2) {
        // Flank - linear interpolation
        const flankT = (absP - toothWidth * 0.5) / (pressRad * 2);
        radius = outerR - flankT * toothDepth;
      } else {
        // Root
        radius = rootR;
      }

      const x = radius * Math.cos(theta);
      const y = radius * Math.sin(theta);
      positions.push(x, z, y);

      // Normal approximation
      const nx = Math.cos(theta);
      const ny = Math.sin(theta);
      normals.push(nx, 0, ny);
    }
  }

  // Index the mesh
  for (let s = 0; s < axialSegs; s++) {
    for (let r = 0; r < radialSegs; r++) {
      const next = (r + 1) % radialSegs;
      const a = s * radialSegs + r;
      const b = s * radialSegs + next;
      const c = (s + 1) * radialSegs + next;
      const d = (s + 1) * radialSegs + r;
      indices.push(a, b, c, a, c, d);
    }
  }

  // ── Bore + annular caps (watertight manifold) ──
  const boreR = rootR * 0.4;
  const boreBase = positions.length / 3;
  for (let s = 0; s <= axialSegs; s++) {
    const t = s / axialSegs;
    const z = -halfLen + t * wormLength;
    for (let r = 0; r < radialSegs; r++) {
      const theta = (r / radialSegs) * Math.PI * 2;
      positions.push(boreR * Math.cos(theta), z, boreR * Math.sin(theta));
      normals.push(-Math.cos(theta), 0, -Math.sin(theta));
    }
  }
  for (let s = 0; s < axialSegs; s++) {
    for (let r = 0; r < radialSegs; r++) {
      const next = (r + 1) % radialSegs;
      const a = boreBase + s * radialSegs + r, b = boreBase + s * radialSegs + next;
      const c = boreBase + (s + 1) * radialSegs + next, d = boreBase + (s + 1) * radialSegs + r;
      indices.push(a, c, b, a, d, c);
    }
  }

  // Bottom annular cap (worm surface ring → bore ring at slice 0)
  for (let r = 0; r < radialSegs; r++) {
    const next = (r + 1) % radialSegs;
    indices.push(r, boreBase + next, boreBase + r);
    indices.push(r, next, boreBase + next);
  }

  // Top annular cap (worm surface ring → bore ring at last slice)
  for (let r = 0; r < radialSegs; r++) {
    const next = (r + 1) % radialSegs;
    const pA = axialSegs * radialSegs + r, pB = axialSegs * radialSegs + next;
    const bA = boreBase + axialSegs * radialSegs + r, bB = boreBase + axialSegs * radialSegs + next;
    indices.push(pA, bA, bB);
    indices.push(pA, bB, pB);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
  geo.setIndex(indices);
  geo.computeVertexNormals();

  return { geo, params: { pitchR, outerR, rootR, length: wormLength, leadAngle, starts, lead, pitch } };
}

// ── Materials ──
const mat1 = new THREE.MeshStandardMaterial({ color: 0x8899aa, metalness: 0.7, roughness: 0.3, side: THREE.DoubleSide });
const mat2 = new THREE.MeshStandardMaterial({ color: 0xaa8866, metalness: 0.7, roughness: 0.3, side: THREE.DoubleSide });

// ── Annotation helpers ──
function clearAnnotations() {
  annotationLines.forEach(l => scene.remove(l));
  annotationLines = [];
}

function addDimLine(from, to, color = 0xffb74d) {
  const pts = [new THREE.Vector3(...from), new THREE.Vector3(...to)];
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({ color, linewidth: 2 });
  const line = new THREE.Line(geo, mat);
  scene.add(line);
  annotationLines.push(line);
}

function addCircleLine(radius, y, color = 0xffb74d, dashed = false) {
  const pts = [];
  for (let i = 0; i <= 64; i++) {
    const a = (i / 64) * Math.PI * 2;
    pts.push(new THREE.Vector3(radius * Math.cos(a), y, radius * Math.sin(a)));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  let mat;
  if (dashed) {
    mat = new THREE.LineDashedMaterial({ color, dashSize: 1.5, gapSize: 1, linewidth: 1 });
  } else {
    mat = new THREE.LineBasicMaterial({ color, linewidth: 1 });
  }
  const line = new THREE.Line(geo, mat);
  if (dashed) line.computeLineDistances();
  scene.add(line);
  annotationLines.push(line);
  return line;
}

function updateAnnotations() {
  clearAnnotations();
  if (!showDims) return;

  const gearType = document.getElementById('gearType').value;

  if (gearType === 'worm') {
    // Worm mode: show length line along the worm axis and center distance
    const wLen = parseInt(document.getElementById('wormLen').value);
    const halfLen = wLen / 2;
    const outerR = g1Params.outerR || 10;

    // Worm length line (along X since worm is rotated horizontal)
    addDimLine([-halfLen, outerR + 3, 0], [halfLen, outerR + 3, 0], 0x66bb6a);
    // Worm diameter line (vertical cross-section)
    addDimLine([0, -outerR, 0], [0, outerR, 0], 0xffb74d);

    if (showGear2 && g2Params.pitchR) {
      const cd = g1Params.pitchR + g2Params.pitchR;
      // Center distance line
      addDimLine([0, 0, 0], [0, -cd, 0], 0xe040fb);
      // Worm wheel pitch circle
      const g2Line = addCircleLine(g2Params.pitchR, 0, 0x4fc3f7, true);
      g2Line.position.y = -cd;
    }
    return;
  }

  if (gearType === 'bevel') {
    // Bevel mode: show outer pitch circle at base of cone
    const p1 = g1Params;
    addCircleLine(p1.pitchR, 0, 0x4fc3f7, true);
    addCircleLine(p1.outerR, 0, 0xffb74d, false);
    // Diameter line
    addDimLine([-p1.outerR, 0, 0], [p1.outerR, 0, 0], 0xffb74d);
    return;
  }

  const faceW = parseInt(document.getElementById('faceWidth').value);
  const halfW = faceW / 2;
  const topY = halfW + 2;

  // Gear 1 annotations
  const p1 = g1Params;
  // Pitch circle
  addCircleLine(p1.pitchR, topY, 0x4fc3f7, true);
  // Outer circle
  addCircleLine(p1.outerR, topY, 0xffb74d, false);
  // Root circle
  addCircleLine(p1.rootR, topY, 0xff7043, true);

  // Diameter line
  addDimLine([-p1.outerR, topY, 0], [p1.outerR, topY, 0], 0xffb74d);
  // Face width line
  addDimLine([p1.outerR + 3, -halfW, 0], [p1.outerR + 3, halfW, 0], 0x66bb6a);

  if (showGear2) {
    const cd = g1Params.pitchR + g2Params.pitchR;
    // Gear 2 pitch circle
    const g2Line = addCircleLine(g2Params.pitchR, topY, 0x4fc3f7, true);
    g2Line.position.x = cd;
    // Gear 2 outer circle
    const g2Outer = addCircleLine(g2Params.outerR, topY, 0xffb74d, false);
    g2Outer.position.x = cd;
    // Center distance line
    addDimLine([0, topY + 3, 0], [cd, topY + 3, 0], 0xe040fb);
  }
}

      <div class="dim-row"><span class="dim-label">Gear Ratio</span><span class="dim-val">1 : ${ratio}</span></div>
    `;
  }

  content.innerHTML = html;
}

// ── STL Export ──
function geometryToSTL(geometry) {
  const pos = geometry.getAttribute('position');
  const idx = geometry.getIndex();
  let stl = 'solid gear\n';

  const triCount = idx ? idx.count / 3 : pos.count / 3;
  const vA = new THREE.Vector3(), vB = new THREE.Vector3(), vC = new THREE.Vector3();
  const cb = new THREE.Vector3(), ab = new THREE.Vector3();

  for (let i = 0; i < triCount; i++) {
    let a, b, c;
    if (idx) { a = idx.getX(i * 3); b = idx.getX(i * 3 + 1); c = idx.getX(i * 3 + 2); }
    else { a = i * 3; b = i * 3 + 1; c = i * 3 + 2; }

    vA.fromBufferAttribute(pos, a);
    vB.fromBufferAttribute(pos, b);
    vC.fromBufferAttribute(pos, c);

    cb.subVectors(vC, vB);
    ab.subVectors(vA, vB);
    cb.cross(ab).normalize();

    stl += `  facet normal ${cb.x} ${cb.y} ${cb.z}\n`;
    stl += `    outer loop\n`;
    stl += `      vertex ${vA.x} ${vA.y} ${vA.z}\n`;
    stl += `      vertex ${vB.x} ${vB.y} ${vB.z}\n`;
    stl += `      vertex ${vC.x} ${vC.y} ${vC.z}\n`;
    stl += `    endloop\n`;
    stl += `  endfacet\n`;
  }

  stl += 'endsolid gear\n';
  return stl;
}

function downloadSTL(geometry, filename) {
  const stl = geometryToSTL(geometry);
  const blob = new Blob([stl], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

// ── Build / Rebuild ──
let gear1Geo = null, gear2Geo = null;

function rebuild() {
  const gearType = document.getElementById('gearType').value;
  const numTeeth1 = parseInt(document.getElementById('teeth1').value);
  const mod = parseFloat(document.getElementById('module').value);
  const helixDeg = gearType === 'spur' ? 0 : parseInt(document.getElementById('helix').value);
  const faceW = parseInt(document.getElementById('faceWidth').value);
  const pressureDeg = parseFloat(document.getElementById('pressure').value);
  const numTeeth2 = parseInt(document.getElementById('teeth2').value);

  // Update display values
  document.getElementById('vTeeth1').textContent = numTeeth1;
  document.getElementById('vHelix').textContent = helixDeg + '\u00B0';
  document.getElementById('vWidth').textContent = faceW;
  document.getElementById('vTeeth2').textContent = numTeeth2;

  // Update worm display values
  const wormStartsEl = document.getElementById('vStarts');
  const wormDiaEl = document.getElementById('vWormDia');
  const wormLenEl = document.getElementById('vWormLen');
  if (wormStartsEl) wormStartsEl.textContent = document.getElementById('wormStarts').value;
  if (wormDiaEl) wormDiaEl.textContent = document.getElementById('wormDia').value;
  if (wormLenEl) wormLenEl.textContent = document.getElementById('wormLen').value;

  // Clear previous meshes
  if (gear1Mesh) gear1Group.remove(gear1Mesh);
  if (gear2Mesh) gear2Group.remove(gear2Mesh);

  // Reset group transforms
  gear1Group.position.set(0, 0, 0);
  gear1Group.rotation.set(0, 0, 0);
  gear2Group.position.set(0, 0, 0);
  gear2Group.rotation.set(0, 0, 0);

  if (gearType === 'worm') {
    // ── Worm gear mode ──
    const wStarts = parseInt(document.getElementById('wormStarts').value);
    const wDia = parseInt(document.getElementById('wormDia').value);
    const wLen = parseInt(document.getElementById('wormLen').value);

    // Build worm (screw)
    const worm = buildWormGeo(mod, wStarts, wDia, wLen, pressureDeg);
    gear1Geo = worm.geo;
    g1Params = worm.params;

    // Rotate worm so its axis is horizontal (along X)
    gear1Mesh = new THREE.Mesh(gear1Geo, mat1);
    gear1Group.rotation.z = Math.PI / 2;
    gear1Group.add(gear1Mesh);

    // Worm wheel (helical gear at 90° – helix angle = worm lead angle)
    if (showGear2) {
      const wheelHelixAngle = g1Params.leadAngle * 180 / Math.PI;
      const r2 = buildHelicalGear(numTeeth2, mod, wheelHelixAngle, faceW, pressureDeg);
      gear2Geo = r2.geo;
      g2Params = r2.profile;
      gear2Mesh = new THREE.Mesh(gear2Geo, mat2);
      gear2Group.add(gear2Mesh);

      // Position wheel below worm at center distance (pitch circles tangent)
      const cd = g1Params.pitchR + g2Params.pitchR;
      gear2Group.position.set(0, -cd, 0);

      // Phase-align wheel teeth to sit between worm threads
      // Offset by half a tooth pitch so wheel tooth gaps align with worm thread crests
      const halfToothAngle = Math.PI / numTeeth2;
      gear2Group.rotation.y = halfToothAngle;

      gear2Group.visible = true;
      document.getElementById('btnExportG2').style.display = 'block';
    } else {
      gear2Group.visible = false;
      gear2Geo = null;
      document.getElementById('btnExportG2').style.display = 'none';
    }

  } else if (gearType === 'bevel') {
    // ── Bevel gear mode ──
    const r1 = buildBevelGear(numTeeth1, mod, faceW, pressureDeg, numTeeth2);
    gear1Geo = r1.geo;
    g1Params = r1.profile;
    g1Params.pitchConeAngle = r1.pitchConeAngle;
    g1Params.coneDistance = r1.coneDistance;
    g1Params.coneRise = r1.coneRise;
    g1Params.innerScale = r1.innerScale;

    gear1Mesh = new THREE.Mesh(gear1Geo, mat1);
    // Tilt gear1 so its cone axis angles between Y and -Z
    gear1Group.rotation.x = -(Math.PI / 2 - r1.pitchConeAngle);
    gear1Group.add(gear1Mesh);

    if (showGear2) {
      // Gear2: swapped teeth counts so its cone angle = 90° - gear1's cone angle
      const r2 = buildBevelGear(numTeeth2, mod, faceW, pressureDeg, numTeeth1);
      gear2Geo = r2.geo;
      g2Params = r2.profile;
      g2Params.pitchConeAngle = r2.pitchConeAngle;
      g2Params.coneDistance = r2.coneDistance;

      gear2Mesh = new THREE.Mesh(gear2Geo, mat2);
      // Flip 180° so teeth face the opposite direction for proper meshing
      gear2Mesh.rotation.y = Math.PI;
      gear2Group.add(gear2Mesh);

      // Tilt gear2 perpendicular to gear1 (90° shaft angle)
      gear2Group.rotation.z = -(Math.PI / 2 - r2.pitchConeAngle);

      // Position gear2 so both pitch cone apexes coincide
      // Apex in local coords is at y = coneDistance * cos(pitchConeAngle)
      // After tilting both groups, compute world apex positions and offset
      // For 90° shaft: pca1 + pca2 = π/2, coneDistance is same for both
      const cd = r1.coneDistance;
      const sinPCA1 = Math.sin(r1.pitchConeAngle);
      const cosPCA1 = Math.cos(r1.pitchConeAngle);
      gear2Group.position.set(
        -cd * sinPCA1 * sinPCA1,
        0,
        -cd * cosPCA1 * cosPCA1
      );

      // Phase alignment: offset by half tooth for tooth-gap meshing
      const halfToothAngle = Math.PI / numTeeth2;
      gear2Group.rotation.y = halfToothAngle;

      gear2Group.visible = true;
      document.getElementById('btnExportG2').style.display = 'block';
    } else {
      gear2Group.visible = false;
      gear2Geo = null;
      document.getElementById('btnExportG2').style.display = 'none';
    }

  } else {
    // ── Spur / Helical / Herringbone mode ──
    const buildFn = gearType === 'herringbone' ? buildHerringboneGear : buildHelicalGear;
    const r1 = buildFn(numTeeth1, mod, helixDeg, faceW, pressureDeg);
    gear1Geo = r1.geo;
    g1Params = r1.profile;
    gear1Mesh = new THREE.Mesh(gear1Geo, mat1);
    gear1Group.add(gear1Mesh);

    if (showGear2) {
      const r2 = buildFn(numTeeth2, mod, -helixDeg, faceW, pressureDeg);
      gear2Geo = r2.geo;
      g2Params = r2.profile;
      gear2Mesh = new THREE.Mesh(gear2Geo, mat2);
      gear2Group.add(gear2Mesh);

      const cd = g1Params.pitchR + g2Params.pitchR;
      gear2Group.position.set(cd, 0, 0);

      const toothAngle2 = Math.PI / numTeeth2;
      gear2Group.rotation.y = toothAngle2;

      gear2Group.visible = true;
      document.getElementById('btnExportG2').style.display = 'block';
    } else {
      gear2Group.visible = false;
      gear2Geo = null;
      document.getElementById('btnExportG2').style.display = 'none';
    }
  }

  updateAnnotations();
  updateDimPanel();
}

// ── Event listeners ──
['teeth1', 'helix', 'faceWidth', 'teeth2', 'wormStarts', 'wormDia', 'wormLen'].forEach(id => {
  document.getElementById(id).addEventListener('input', rebuild);
});
['module', 'pressure'].forEach(id => {
  document.getElementById(id).addEventListener('change', rebuild);
});

document.getElementById('gearType').addEventListener('change', (e) => {
  const val = e.target.value;
  const isWorm = val === 'worm';
  const isSpur = val === 'spur';
  const isHelical = val === 'helical';
  const isHerringbone = val === 'herringbone';
  const isBevel = val === 'bevel';

  // Helix angle: show for helical and herringbone
  const showHelix = isHelical || isHerringbone;
  const helixParam = document.getElementById('helixParam');
  helixParam.classList.toggle('hidden', !showHelix);
  helixParam.classList.toggle('visible', showHelix);

  // Worm params: show only for worm
  document.getElementById('wormParams').style.display = isWorm ? 'block' : 'none';

  // Teeth1: hide for worm (worm doesn't have "teeth")
  document.getElementById('teeth1').parentElement.style.display = isWorm ? 'none' : '';

  // Face width: hide for worm (no worm wheel shown)
  document.getElementById('faceWidth').parentElement.style.display = isWorm ? 'none' : '';

  // Title
  const titles = { spur: 'Spur Gear Designer', helical: 'Helical Gear Designer', herringbone: 'Herringbone Gear Designer', bevel: 'Bevel Gear Designer', worm: 'Worm Gear Designer' };
  document.getElementById('designerTitle').textContent = titles[val];

  // Section labels
  const h3s = document.querySelectorAll('#controls h3');
  if (isWorm) {
    h3s[0].textContent = 'Worm (Driver)';
    h3s[1].textContent = 'Worm Wheel (Driven)';
  } else {
    h3s[0].textContent = 'Gear 1 (Driver)';
    h3s[1].textContent = 'Gear 2 (Driven)';
  }

  // Export button labels
  const btnLabels = { spur: ['Export Gear 1 STL', 'Export Gear 2 STL'], helical: ['Export Gear 1 STL', 'Export Gear 2 STL'], herringbone: ['Export Gear 1 STL', 'Export Gear 2 STL'], bevel: ['Export Gear 1 STL', 'Export Gear 2 STL'], worm: ['Export Worm STL', 'Export Worm Wheel STL'] };
  document.getElementById('btnExportG1').textContent = btnLabels[val][0];
  document.getElementById('btnExportG2').textContent = btnLabels[val][1];

  // Worm/Bevel mode: disable meshing gear
  const showGear2CB = document.getElementById('showGear2');
  const gear2Header = document.querySelectorAll('#controls h3')[1];
  if (isWorm || isBevel) {
    showGear2CB.checked = false;
    showGear2CB.disabled = true;
    showGear2 = false;
    document.getElementById('gear2Section').classList.remove('enabled');
    showGear2CB.parentElement.style.opacity = '0.4';
    showGear2CB.parentElement.style.cursor = 'not-allowed';
    gear2Header.style.opacity = '0.4';
    document.getElementById('btnExportG2').style.display = 'none';
  } else {
    showGear2CB.disabled = false;
    showGear2CB.parentElement.style.opacity = '1';
    showGear2CB.parentElement.style.cursor = '';
    gear2Header.style.opacity = '1';
  }

  // Reset animation state when switching
  gear1Group.rotation.set(0, 0, 0);
  gear2Group.rotation.set(0, 0, 0);

  rebuild();
});

document.getElementById('showGear2').addEventListener('change', (e) => {
  showGear2 = e.target.checked;
  document.getElementById('gear2Section').classList.toggle('enabled', showGear2);
  rebuild();
});

document.getElementById('btnAnimate').addEventListener('click', () => {
  animating = !animating;
  const btn = document.getElementById('btnAnimate');
  btn.textContent = animating ? 'Stop Animation' : 'Start Animation';
  btn.classList.toggle('active', animating);
  document.getElementById('speedParam').style.display = animating ? 'block' : 'none';
});

document.getElementById('speed').addEventListener('input', (e) => {
  document.getElementById('vSpeed').textContent = (e.target.value / 10).toFixed(1) + 'x';
});

document.getElementById('btnDims').addEventListener('click', () => {
  showDims = !showDims;
  const btn = document.getElementById('btnDims');
  btn.textContent = showDims ? 'Hide Dimensions' : 'Show Dimensions';
  btn.classList.toggle('active', showDims);
  updateAnnotations();
  updateDimPanel();
});

document.getElementById('btnExportG1').addEventListener('click', () => {
  if (!gear1Geo) return;
  const gt = document.getElementById('gearType').value;
  const names = { spur: 'spur_gear_1.stl', helical: 'helical_gear_1.stl', herringbone: 'herringbone_gear_1.stl', bevel: 'bevel_gear_1.stl', worm: 'worm.stl' };
  downloadSTL(gear1Geo, names[gt] || 'gear_1.stl');
});

document.getElementById('btnExportG2').addEventListener('click', () => {
  if (!gear2Geo) return;
  const gt = document.getElementById('gearType').value;
  const names = { spur: 'spur_gear_2.stl', helical: 'helical_gear_2.stl', herringbone: 'herringbone_gear_2.stl', bevel: 'bevel_gear_2.stl', worm: 'worm_wheel.stl' };
  downloadSTL(gear2Geo, names[gt] || 'gear_2.stl');
});

// ── Init ──
rebuild();

// ── Animation loop ──
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  orbitControls.update();

  if (animating) {
    const speed = parseInt(document.getElementById('speed').value) / 10;
    const delta = clock.getDelta();
    const gearType = document.getElementById('gearType').value;

    if (gearType === 'worm') {
      // Worm spins around its own local axis (Y of mesh inside the rotated group)
      if (gear1Mesh) gear1Mesh.rotation.y += delta * speed;

      if (showGear2) {
        const wStarts = parseInt(document.getElementById('wormStarts').value);
        const numTeeth2 = parseInt(document.getElementById('teeth2').value);
        const ratio = wStarts / numTeeth2;
        // Preserve phase offset while animating
        const halfToothAngle = Math.PI / numTeeth2;
        gear2Group.rotation.y = halfToothAngle - gear1Mesh.rotation.y * ratio;
      }
    } else if (gearType === 'bevel') {
      // Bevel gears: rotate meshes inside their tilted groups (local Y axis)
      if (gear1Mesh) gear1Mesh.rotation.y += delta * speed;

      if (showGear2 && gear2Mesh) {
        const numTeeth1 = parseInt(document.getElementById('teeth1').value);
        const numTeeth2 = parseInt(document.getElementById('teeth2').value);
        const ratio = numTeeth1 / numTeeth2;
        const halfToothAngle = Math.PI / numTeeth2;
        // Preserve the 180° flip while animating
        gear2Mesh.rotation.y = Math.PI + halfToothAngle - gear1Mesh.rotation.y * ratio;
      }
    } else {
      const numTeeth1 = parseInt(document.getElementById('teeth1').value);
      const numTeeth2 = parseInt(document.getElementById('teeth2').value);

      gear1Group.rotation.y += delta * speed;

      if (showGear2) {
        const ratio = numTeeth1 / numTeeth2;
        const toothAngle2 = Math.PI / numTeeth2;
        gear2Group.rotation.y = toothAngle2 - gear1Group.rotation.y * ratio;
      }
    }
  } else {
    clock.getDelta(); // consume delta so it doesn't accumulate
  }

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── Mobile menu drawer ──
const menuToggle = document.getElementById('menuToggle');
const menuOverlay = document.getElementById('menuOverlay');
const controlsPanel = document.getElementById('controls');

const menuHint = document.getElementById('menuHint');

function openMenu() {
  controlsPanel.classList.add('open');
  menuOverlay.classList.add('visible');
  menuToggle.innerHTML = '&#10005;'; // X icon
  if (menuHint) menuHint.style.display = 'none';
}

function closeMenu() {
  controlsPanel.classList.remove('open');
  menuOverlay.classList.remove('visible');
  menuToggle.innerHTML = '&#9776;'; // hamburger icon
}

menuToggle.addEventListener('click', () => {
  if (controlsPanel.classList.contains('open')) closeMenu();
  else openMenu();
});

menuOverlay.addEventListener('click', closeMenu);
</script>
